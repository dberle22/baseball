<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Fantasy Baseball Dashboard{% endblock %}</title>
    <style>
      :root {
        --bg: #f4f1ea;
        --panel: #fffdf8;
        --panel-border: #d7d0c4;
        --ink: #1e2430;
        --muted: #6f7683;
        --accent: #124e66;
        --win: #217346;
        --lose: #a63d40;
        --close: #8a6d1d;
        --grade-a: #2f6f3e;
        --grade-b: #638f4d;
        --grade-c: #9a8f40;
        --grade-d: #9a5a2f;
        --grade-neutral: #667085;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(180deg, #f7f4ed 0%, #ece5d7 100%);
        color: var(--ink);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      .header {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 16px;
        padding: 20px;
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        background: rgba(255, 253, 248, 0.92);
        box-shadow: 0 12px 30px rgba(30, 36, 48, 0.08);
      }

      .header h1 {
        margin: 0 0 6px;
        font-size: 2rem;
      }

      .subhead {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .header-actions {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
      }

      .nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .nav a {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--panel-border);
        background: #f8f3ea;
        font-size: 0.92rem;
      }

      .refresh-form button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        background: var(--accent);
        color: white;
        font: inherit;
        cursor: pointer;
      }

      .meta {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .grid {
        display: grid;
        gap: 18px;
        margin-top: 20px;
      }

      .panel {
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        background: var(--panel);
        padding: 18px;
        box-shadow: 0 10px 24px rgba(30, 36, 48, 0.05);
      }

      .panel h2,
      .panel h3 {
        margin-top: 0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.95rem;
      }

      th,
      td {
        text-align: left;
        padding: 10px 8px;
        border-bottom: 1px solid #ece5d7;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-weight: 600;
      }

      .status-pill,
      .grade-pill {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        color: white;
        font-size: 0.82rem;
        white-space: nowrap;
      }

      .status-win {
        background: var(--win);
      }

      .status-lose {
        background: var(--lose);
      }

      .status-close {
        background: var(--close);
      }

      .grade-a {
        background: var(--grade-a);
      }

      .grade-b {
        background: var(--grade-b);
      }

      .grade-c {
        background: var(--grade-c);
      }

      .grade-d {
        background: var(--grade-d);
      }

      .grade-neutral {
        background: var(--grade-neutral);
      }

      .muted {
        color: var(--muted);
      }

      .completed-row {
        color: var(--muted);
        background: #f4efe5;
      }

      .split {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      }

      .empty-state {
        padding: 32px 20px;
        text-align: center;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .header-actions {
          align-items: flex-start;
        }

        .shell {
          padding: 16px 12px 36px;
        }

        table {
          display: block;
          overflow-x: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <div>
          <h1>{{ team_name }}</h1>
          <div class="subhead">Week {{ week }} vs {{ opponent_name }}</div>
        </div>
        <div class="header-actions">
          <nav class="nav">
            <a href="/">Dashboard</a>
            <a href="/my-week">My Week</a>
            <a href="/waiver">Waivers</a>
          </nav>
          <form class="refresh-form" method="post" action="/refresh">
            <button type="submit">Refresh</button>
          </form>
          <div class="meta">Last refreshed: {{ last_refreshed }}</div>
        </div>
      </header>

      {% if has_data %}
        {% block content %}{% endblock %}
      {% else %}
        <section class="panel empty-state">
          <h2>No cache data yet</h2>
          <p>Run a refresh to build the local in-season dashboard cache.</p>
        </section>
      {% endif %}
    </div>
  </body>
</html>
